services:
  server:
    build: ./server
    container_name: ems-server
    ports:
      - "5001:5001"
    env_file:
      - ./server/.env
    restart: unless-stopped
  client:
    build: ./client
    container_name: ems-client
    ports:
      - "5173:5173"
    depends_on:
      - server
    restart: unless-stopped